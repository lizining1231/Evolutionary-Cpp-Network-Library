version: '3.8'

services:
  im-gateway:
    build: .
    container_name: "im-gateway-${NODE_ENV:-dev}"

    ports:
      - "${EXTERNAL_PORT:-8080}:${PORT:-8080}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MAX_CONNECTIONS: ${MAX_CONNECTIONS:-1000}
      PORT: ${PORT:-8080}
    cap_add:
      - SYS_PTRACE
    restart: "no"
    networks:
      - im-network
    # ===== 添加资源限制 =====
    deploy:
      resources:
        limits:
          cpus: ${CPU_LIMIT:-0}        # 默认无限制
          memory: ${MEMORY_LIMIT:-0}    # 默认无限制
        reservations:
          cpus: ${CPU_RESERVATION:-0}
          memory: ${MEMORY_RESERVATION:-0}
    # 或者用简单格式（根据您的 compose 版本选择）
    # cpus: ${CPU_LIMIT:-0}
    # mem_limit: ${MEMORY_LIMIT:-0}
    # mem_reservation: ${MEMORY_RESERVATION:-0}

networks:
  im-network:
    driver: bridge