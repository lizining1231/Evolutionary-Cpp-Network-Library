version: '3.8'

services:
  im-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "im-gateway-${NODE_ENV:-test}-dev"
    
    ports:
      - "${EXTERNAL_PORT:-18080}:${PORT:-8080}"
    
    # 资源限制
    cpus: 4
    mem_limit: 2g
    mem_reservation: 1g
    
    volumes:
      - ./build:/app/bin
    
    environment:
      NODE_ENV: ${NODE_ENV:-test}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MAX_CONNECTIONS: ${MAX_CONNECTIONS:-1000}
      PORT: ${PORT:-8080}
    
    cap_add:
      - SYS_PTRACE
    
    restart: "no"
    networks:
      - im-network

networks:
  im-network:
    driver: bridge